name: Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract source if needed
        run: |
          if [ -f colorceilings_addon.zip ]; then
            unzip -o colorceilings_addon.zip
            if [ -d colorceilings_addon ]; then
              mv colorceilings_addon/* .
              rmdir colorceilings_addon
            fi
            rm colorceilings_addon.zip
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 7.5.1
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.5.1'

      - name: Generate correct settings.gradle and build.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  maven { url 'https://maven.fabricmc.net/' }
                  gradlePluginPortal()
                  mavenCentral()
              }
          }
          rootProject.name = 'mtr-color-ceilings'
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  maven { url 'https://maven.fabricmc.net/' }
                  mavenCentral()
              }
              dependencies {
                  classpath 'fabric-loom:fabric-loom.gradle.plugin:0.12.17'
              }
          }
          apply plugin: 'fabric-loom'

          sourceCompatibility = JavaVersion.VERSION_17
          targetCompatibility = JavaVersion.VERSION_17
          archivesBaseName = "mtr-color-ceilings"
          version = "1.0.0"
          group = "com.yourname"

          repositories {
              mavenCentral()
              maven { url "https://maven.fabricmc.net/" }
          }

          dependencies {
              minecraft "com.mojang:minecraft:1.18.2"
              mappings "net.fabricmc:yarn:1.18.2+build.4:v2"
              modImplementation "net.fabricmc:fabric-loader:0.14.6"
              modCompileOnly "net.fabricmc.fabric-api:fabric-api:0.77.0+1.18.2"
              modCompileOnly files("libs/MTR-fabric-1.18.2-3.2.2-hotfix-1.jar")
          }
          EOF

      - name: Cache Minecraft jars
        run: |
          LOOM_CACHE=$HOME/.gradle/caches/fabric-loom/1.18.2
          mkdir -p "$LOOM_CACHE"
          curl -L -o "$LOOM_CACHE/minecraft-client.jar" \
            "https://launcher.mojang.com/v1/objects/2e9a3e3107cca00d6bc9c97bf7f149aae163ef21/client.jar"
          curl -L -o "$LOOM_CACHE/minecraft-server.jar" \
            "https://launcher.mojang.com/v1/objects/2e9a3e3107cca00d6bc9c97bf7f149aae163ef21/server.jar"

      - name: Download MTR dependency
        run: |
          mkdir -p libs
          if [ ! -f libs/MTR-fabric-1.18.2-3.2.2-hotfix-1.jar ]; then
            curl -L -o libs/MTR-fabric-1.18.2-3.2.2-hotfix-1.jar \
              "https://github.com/JonathanHuangMTR/Minecraft-Transit-Railway/releases/download/v3.2.2-hotfix-1/MTR-fabric-1.18.2-3.2.2-hotfix-1.jar"
          fi

      - name: Build
        run: gradle build --no-daemon

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mod JAR
          path: build/libs/*.jar
