name: Build Mod
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract addon source
        run: |
          unzip colorceilings_addon.zip -d .
          rm colorceilings_addon.zip
          ls -la

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: |
          echo "plugins { id 'fabric-loom' version '1.0-SNAPSHOT' }" > build.gradle
          echo "sourceCompatibility = JavaVersion.VERSION_17" >> build.gradle
          echo "targetCompatibility = JavaVersion.VERSION_17" >> build.gradle
          echo "archivesBaseName = 'mtr-color-ceilings'" >> build.gradle
          echo "version = '1.0.0'" >> build.gradle
          echo "group = 'com.yourname'" >> build.gradle
          echo "rootProject.name = 'mtr-color-ceilings'" > settings.gradle
          ./gradlew build --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mod JAR
          path: build/libs/*.jar
