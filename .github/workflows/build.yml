name: Build Mod
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract addon source
        run: |
          unzip colorceilings_addon.zip
          if [ -d colorceilings_addon ]; then
            mv colorceilings_addon/* .
            rmdir colorceilings_addon
          fi
          rm -f colorceilings_addon.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.5.1'

      - name: Download MTR dependency
        run: |
          mkdir -p libs
          curl -L -o libs/MTR-fabric-1.18.2-3.2.2-hotfix-1.jar \
            "https://github.com/JonathanHuangMTR/Minecraft-Transit-Railway/releases/download/v3.2.2-hotfix-1/MTR-fabric-1.18.2-3.2.2-hotfix-1.jar" \
            || curl -L -o libs/MTR-fabric-1.18.2-3.2.2-hotfix-1.jar \
            "https://cdn.modrinth.com/data/eT5MZg8D/versions/3.2.2-hotfix-1/MTR-fabric-1.18.2-3.2.2-hotfix-1.jar"

      - name: Generate build files
        run: |
          # settings.gradle（不需要插件管理，Loom 插件直接在 build.gradle 里声明）
          echo "rootProject.name = 'mtr-color-ceilings'" > settings.gradle

          # build.gradle（使用 Mojang 官方映射，无需 Yarn，极简可靠）
          cat > build.gradle << 'EOF'
          plugins {
              id 'fabric-loom' version '0.12.17'
          }
          sourceCompatibility = JavaVersion.VERSION_17
          targetCompatibility = JavaVersion.VERSION_17
          archivesBaseName = "mtr-color-ceilings"
          version = "1.0.0"
          group = "com.yourname"

          repositories {
              mavenCentral()
              maven { url "https://maven.fabricmc.net/" }
          }

          dependencies {
              minecraft "com.mojang:minecraft:1.18.2"
              mappings loom.officialMojangMappings()
              modImplementation "net.fabricmc:fabric-loader:0.14.6"
              modCompileOnly "net.fabricmc.fabric-api:fabric-api:0.77.0+1.18.2"
              modCompileOnly files("libs/MTR-fabric-1.18.2-3.2.2-hotfix-1.jar")
          }
          EOF

      - name: Patch fabric.mod.json to add fabric dependency
        run: |
          apt-get update -qq && apt-get install -y -qq jq > /dev/null 2>&1
          if [ -f fabric.mod.json ]; then
            jq '.depends.fabric = "*"' fabric.mod.json > tmp && mv tmp fabric.mod.json
          fi

      - name: Build
        run: gradle build --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mod JAR
          path: build/libs/*.jar
