name: Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract source if zip exists
        run: |
          if [ -f colorceilings_addon.zip ]; then
            unzip -o colorceilings_addon.zip
            if [ -d colorceilings_addon ]; then
              mv colorceilings_addon/* .
              rmdir colorceilings_addon
            fi
            rm colorceilings_addon.zip
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.10
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Generate build configuration
        run: |
          # settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  maven { url 'https://maven.fabricmc.net/' }
                  gradlePluginPortal()
                  mavenCentral()
              }
          }
          rootProject.name = 'mtr-color-ceilings'
          EOF

          # build.gradle (使用 Loom 1.0.22 + Mojang 官方映射，完全走 Maven)
          cat > build.gradle << 'EOF'
          plugins {
              id 'fabric-loom' version '1.0.22'
          }

          sourceCompatibility = JavaVersion.VERSION_17
          targetCompatibility = JavaVersion.VERSION_17
          archivesBaseName = "mtr-color-ceilings"
          version = "1.0.0"
          group = "com.yourname"

          repositories {
              mavenCentral()
              maven { url "https://maven.fabricmc.net/" }
          }

          dependencies {
              minecraft "com.mojang:minecraft:1.18.2"
              mappings loom.officialMojangMappings()
              modImplementation "net.fabricmc:fabric-loader:0.14.21"
              modCompileOnly "net.fabricmc.fabric-api:fabric-api:0.77.0+1.18.2"
              modCompileOnly files("libs/MTR-fabric-1.18.2-3.2.2-hotfix-1.jar")
          }
          EOF

          # gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048M" > gradle.properties

      - name: Download MTR dependency
        run: |
          mkdir -p libs
          if [ ! -f libs/MTR-fabric-1.18.2-3.2.2-hotfix-1.jar ]; then
            curl -L -o libs/MTR-fabric-1.18.2-3.2.2-hotfix-1.jar \
              "https://github.com/JonathanHuangMTR/Minecraft-Transit-Railway/releases/download/v3.2.2-hotfix-1/MTR-fabric-1.18.2-3.2.2-hotfix-1.jar"
          fi

      - name: Build
        run: gradle build --no-daemon

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mod JAR
          path: build/libs/*.jar
