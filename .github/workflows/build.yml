name: Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract gradle wrapper files
        run: |
          unzip gradle-wrapper.zip
          rm gradle-wrapper.zip
          chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Minecraft jars
        run: |
          LOOM_CACHE=$HOME/.gradle/caches/fabric-loom/1.18.2
          mkdir -p "$LOOM_CACHE"
          curl -L -o "$LOOM_CACHE/minecraft-client.jar" \
            "https://launcher.mojang.com/v1/objects/2e9a3e3107cca00d6bc9c97bf7f149aae163ef21/client.jar"
          curl -L -o "$LOOM_CACHE/minecraft-server.jar" \
            "https://launcher.mojang.com/v1/objects/2e9a3e3107cca00d6bc9c97bf7f149aae163ef21/server.jar"

      - name: Download MTR dependency
        run: |
          mkdir -p libs
          if [ ! -f libs/MTR-fabric-1.18.2-3.2.2-hotfix-1.jar ]; then
            curl -L -o libs/MTR-fabric-1.18.2-3.2.2-hotfix-1.jar \
              "https://github.com/JonathanHuangMTR/Minecraft-Transit-Railway/releases/download/v3.2.2-hotfix-1/MTR-fabric-1.18.2-3.2.2-hotfix-1.jar"
          fi

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mod JAR
          path: build/libs/*.jar
